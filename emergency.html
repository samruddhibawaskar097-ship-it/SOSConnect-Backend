
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Features</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="api.js"></script>
</head>
<body>

<button onclick="window.location.href='dashboard.html'" class="back-btn">
  <i class="fa-solid fa-arrow-left"></i>
</button>

<div class="container">
  <h1 class="title">Emergency Features</h1>
  <div class="title-line"></div>

  <div class="grid">

    <!-- CARD 1 - Voice Code -->
    <div class="card" onclick="window.location.href='voicecode.html'">
      <div class="icon-box">
        <i class="fa-solid fa-microphone"></i>
      </div>
      <h3>Silent SOS Voice Code</h3>
      <p>Detects secret phrase to trigger SOS.</p>
    </div>

    <!-- CARD 2 - Live Video -->
    <div class="card" onclick="window.location.href='camera.html'">
      <div class="icon-box">
        <i class="fa-solid fa-video"></i>
      </div>
      <h3>Live Video Evidence</h3>
      <p>Auto-starts camera stream when SOS is triggered.</p>
    </div>

    <!-- CARD 3 - First Aid -->
    <div class="card">
      <div class="icon-box">
        <i class="fa-solid fa-plus"></i>
      </div>
      <h3>First Aid Help</h3>
      <input type="text" id="firstAidInput" placeholder="e.g. cpr, bleeding, burn" style="width:100%;padding:6px;border-radius:6px;border:none;margin:8px 0;">
      <button onclick="askFirstAid()" style="width:100%;padding:8px;border-radius:6px;border:none;background:#00c8ff;font-weight:bold;cursor:pointer;">Get Instructions</button>
      <div id="firstAidResult" style="color:white;font-size:12px;margin-top:8px;text-align:left;line-height:1.6;"></div>
    </div>

    <!-- CARD 4 - No Response Alert -->
    <div class="card">
      <div class="icon-box">
        <i class="fa-solid fa-comment"></i>
      </div>
      <h3>No Response Alert</h3>
      <p>If user does not respond, SMS is sent to emergency contacts.</p>
      <button onclick="startCheckin()" style="width:100%;padding:8px;border-radius:6px;border:none;background:#ff9900;font-weight:bold;cursor:pointer;margin-top:8px;">Start Check-in</button>
      <div id="checkinResult" style="color:white;font-size:12px;margin-top:6px;"></div>
    </div>

  </div>
</div>

<script>
async function askFirstAid() {
  const keyword = document.getElementById("firstAidInput").value.trim();
  const result = document.getElementById("firstAidResult");

  if (!keyword) {
    result.innerHTML = "<span style='color:orange;'>Enter a keyword like: cpr, bleeding, burn, choking</span>";
    return;
  }

  result.innerHTML = "Loading...";

  try {
    const data = await getFirstAid(keyword);
    if (data.instructions) {
      result.innerHTML = `<b>${data.instructions.title}</b><br><br>` +
        data.instructions.steps.map((s, i) => `${i + 1}. ${s}`).join("<br>");
    } else {
      result.innerHTML = "<span style='color:orange;'>Not found. Try: cpr, bleeding, burn, choking, fracture, seizure</span>";
    }
  } catch (e) {
    result.innerHTML = "<span style='color:red;'>Error fetching instructions.</span>";
  }
}

async function startCheckin() {
  const result = document.getElementById("checkinResult");
  result.innerHTML = "Starting check-in...";
  try {
    const data = await startCheckinAPI(30);
    result.innerHTML = "✅ " + data.message;
  } catch (e) {
    result.innerHTML = "<span style='color:red;'>Error starting check-in.</span>";
  }
}
</script>

</body>
</html>
