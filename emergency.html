<!DOCTYPE html>
<html>
<head>
    <script src="api.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emergency Features</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
<button onclick="window.location.href='dashboard.html'" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
</button>
<div class="container">

<h1 class="title">Emergency Features</h1>
<div class="title-line"></div>

<div class="grid">

<!-- CARD 1 -->

<div class="card">

<div class="card" onclick="window.location.href='voicecode.html'">

<div class="icon-box">
<i class="fa-solid fa-microphone"></i>
</div>

<h3>Silent SOS Voice Code</h3>

<p>Detects secret phrase to trigger SOS.</p>

</div>

<!-- CARD 2 -->

<div class="card" onclick="window.location.href='camera.html'">

<div class="icon-box">
<i class="fa-solid fa-video"></i>
</div>

<h3>Live Video Evidence</h3>

<p>
Auto-starts camera stream when SOS is triggered.
</p>

</div>

<!-- CARD 3 -->

<div class="card">

<div class="icon-box">
<i class="fa-solid fa-plus"></i>
</div>

<h3>First Aid Help</h3>

<input type="text" placeholder="En: keyword">

<button>Get Instructions</button>

</div>

<!-- CARD 4 -->

<div class="card">

<div class="icon-box">
<i class="fa-solid fa-comment"></i>
</div>

<input type="text" id="firstAidInput" placeholder="e.g. cpr, bleeding, burn">
<button onclick="askFirstAid()">Get Instructions</button>
<div id="firstAidResult" style="color:white; font-size:12px; margin-top:8px;"></div>

<h3>No Response Alert</h3>

<p>
If user does not respond, SMS is sent to emergency contacts.
</p>

</div>

</div>

</div>

</body>
</html>
