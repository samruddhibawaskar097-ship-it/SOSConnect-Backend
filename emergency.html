
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Features</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="api.js"></script>
</head>
<body>

<button onclick="window.location.href='dashboard.html'" class="back-btn">
  <i class="fa-solid fa-arrow-left"></i>
</button>

<div class="container">
  <h1 class="title">Emergency Features</h1>
  <div class="title-line"></div>

  <div class="grid">


    <div class="card" onclick="window.location.href='camera.html'">
      <div class="icon-box">
        <i class="fa-solid fa-video"></i>
      </div>
      <h3>Live Video Evidence</h3>
      <p>Auto-starts camera stream when SOS is triggered.</p>
    </div>

    

  </div>
</div>

<script>
async function askFirstAid() {
  const keyword = document.getElementById("firstAidInput").value.trim();
  const result = document.getElementById("firstAidResult");
  if (!keyword) { result.innerHTML = "Enter a keyword like: cpr, bleeding, burn"; return; }
  result.innerHTML = "Loading...";
  try {
    const data = await getFirstAid(keyword);
    if (data.instructions) {
      result.innerHTML = "<b>" + data.instructions.title + "</b><br><br>" +
        data.instructions.steps.map((s, i) => (i+1) + ". " + s).join("<br>");
    } else {
      result.innerHTML = "Not found. Try: cpr, bleeding, burn, choking, fracture, seizure";
    }
  } catch (e) {
    result.innerHTML = "Error fetching instructions.";
  }
}

async function startCheckin() {
  const result = document.getElementById("checkinResult");
  result.innerHTML = "Starting...";
  try {
    const data = await startCheckinAPI(30);
    result.innerHTML = "✅ " + data.message;
  } catch (e) {
    result.innerHTML = "Error starting check-in.";
  }
}
</script>

</body>
</html>
