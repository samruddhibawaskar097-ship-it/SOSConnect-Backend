<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Map Preview</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<button class="back-btn" onclick="window.location.href='dashboard.html'">
<i class="fa-solid fa-arrow-left"></i>
</button>

<div class="map-container">

<h1 class="title">Map Preview</h1>

<div class="map-box">

<i class="fa-solid fa-map-location-dot map-icon"></i>

<p class="map-text">Nearby Emergency Network</p>

</div>

<div class="map-info">

<div class="info-item">
<i class="fa-solid fa-user-shield"></i>
<span>Nearby Responders Available</span>
</div>

<div class="info-item">
<i class="fa-solid fa-hospital"></i>
<span>Nearest Hospitals</span>
</div>

<div class="info-item">
<i class="fa-solid fa-building-shield"></i>
<span>Police Stations Nearby</span>
</div>

<div class="info-item">
<i class="fa-solid fa-hand-holding-heart"></i>
<span>Community SOS Responders</span>
</div>

</div>

</div>

</body>

</html>
