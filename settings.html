<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<button class="back-btn" onclick="window.location.href='dashboard.html'">
<i class="fa-solid fa-arrow-left"></i>
</button>

<div class="settings-container">

<h1 class="title">Settings</h1>

<div class="settings-cards">

<div class="setting-card" onclick="window.location.href='profile.html'">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</div>

<div class="setting-card" onclick="window.location.href='notifications.html'">
<i class="fa-solid fa-bell"></i>
<span>Notifications</span>
</div>

<div class="setting-card" onclick="window.location.href='security.html'">
<i class="fa-solid fa-shield-halved"></i>
<span>Security</span>
</div>

<div class="setting-card" onclick="window.location.href='sos.html'">
<i class="fa-solid fa-triangle-exclamation"></i>
<span>SOS Preferences</span>
</div>

<div class="setting-card logout">
<i class="fa-solid fa-right-from-bracket"></i>
<span>Logout</span>
</div>

</div>

</div>

</body>
</html>
