<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emergency Services</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<button class="back-btn" onclick="window.location.href='dashboard.html'">
<i class="fa-solid fa-arrow-left"></i>
</button>

<div class="page-container">

<h1 class="title">Emergency Services</h1>

<div class="service-card">
<i class="fa-solid fa-shield-halved"></i>
<span>Police Station</span>
<a href="tel:100" class="call-btn">Call 100</a>
</div>

<div class="service-card">
<i class="fa-solid fa-truck-medical"></i>
<span>Ambulance</span>
<a href="tel:102" class="call-btn">Call 102</a>
</div>

<div class="service-card">
<i class="fa-solid fa-fire-extinguisher"></i>
<span>Fire Brigade</span>
<a href="tel:101" class="call-btn">Call 101</a>
</div>

<div class="service-card">
<i class="fa-solid fa-hospital"></i>
<span>Nearby Hospital</span>
<a href="https://www.google.com/maps/search/hospital+near+me" 
target="_blank" class="call-btn">Open Map</a>
</div>

<div class="travel-box">

<h3>🌍 Travel Safety Mode</h3>

<p id="travelInfo">
Detecting location for local emergency numbers...
</p>

</div>

</div>

<script>

const info = document.getElementById("travelInfo");

function detectCountry(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(success, error);

}else{

info.innerHTML = "Location not supported.";

}

}

function success(position){

let lat = position.coords.latitude;
let lon = position.coords.longitude;

/* Simple demo logic */

if(lat > 6 && lat < 37 && lon > 68 && lon < 97){

// User inside India

info.innerHTML = `
🇮🇳 You are in India

Police: 100  
Ambulance: 102  
Fire: 101  

Emergency phrase:
"Mujhe madad chahiye"
`;

}

else{

// User outside India

info.innerHTML = `
🌍 Foreign Country Detected

Universal Emergency Number: 112

Safety Tip:
Contact nearest embassy if required.

Emergency Phrase:
"Help! I need assistance"
`;

}

}

function error(){

info.innerHTML = "Unable to detect location.";

}

detectCountry();

</script>

</body>

</html>
